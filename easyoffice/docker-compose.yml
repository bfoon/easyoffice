version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: easyoffice_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-easyoffice}
      POSTGRES_USER: ${DB_USER:-easyoffice}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-easyoffice_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Loopback-only: reachable for host-side psql, invisible to the internet.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-easyoffice}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easyoffice_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyoffice_web
    restart: unless-stopped
    # ASGI, not WSGI — Channels WebSockets (/ws/...) do not work under
    # plain gunicorn sync workers. Requires `uvicorn` in requirements.txt.
    command: >
      sh -c "python manage.py makemigrations core organization staff tasks projects messaging files finance hr it_support dashboard reports &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_default_data &&
             gunicorn easyoffice.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    environment:
      # Internal URL Django uses to fetch /hosting/discovery:
      - COLLABORA_SERVER_URL=http://collabora:9980
      # Public URL the BROWSER loads the editor from (via nginx):
      - COLLABORA_PUBLIC_URL=https://easyoffice.gm
      # WOPISrc host — Collabora calls this back over the docker network:
      - COLLABORA_WOPI_HOST=http://web:8000
      # Used for PostMessageOrigin / breadcrumb links in WOPI responses:
      - SITE_URL=https://easyoffice.gm
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    # No published port — nginx reaches web:8000 on the compose network.
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyoffice_celery
    restart: unless-stopped
    command: celery -A easyoffice worker -l info -Q default,notifications,reports
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyoffice_beat
    restart: unless-stopped
    command: celery -A easyoffice beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: easyoffice_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - web
      - collabora

  collabora:
    image: collabora/code:latest
    container_name: easyoffice_collabora
    restart: unless-stopped
    # No published port — nginx proxies /browser/, /cool/, /hosting/ to it.
    # Publishing 9980 would expose the admin console to the internet.
    expose:
      - "9980"
    environment:
      # Must match the WOPISrc host Django embeds (internal callback):
      - aliasgroup1=http://web:8000
      - DONT_GEN_SSL_CERT=YES
      # ssl.termination=true    → nginx terminates TLS in front of us
      # server_name             → discovery returns easyoffice.gm URLs
      # net.frame_ancestors     → REQUIRED: the WOPI host (web:8000) differs
      #                           from the embedding page (easyoffice.gm), so
      #                           without this the iframe is blocked by CSP.
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:server_name=easyoffice.gm --o:net.frame_ancestors=easyoffice.gm
      - username=admin
      - password=${COLLABORA_ADMIN_PASSWORD:-changeme}
    cap_add:
      - MKNOD
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data: