version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: easyoffice_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-easyoffice}
      POSTGRES_USER: ${DB_USER:-easyoffice}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-easyoffice_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-easyoffice}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easyoffice_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyoffice_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py makemigrations core organization staff tasks projects messaging files finance hr it_support dashboard reports &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_default_data &&
             gunicorn easyoffice.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyoffice_celery
    restart: unless-stopped
    command: celery -A easyoffice worker -l info -Q default,notifications,reports
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyoffice_beat
    restart: unless-stopped
    command: celery -A easyoffice beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: easyoffice_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
