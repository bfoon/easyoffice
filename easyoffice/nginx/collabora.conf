# nginx/collabora.conf
# Add this include to your main nginx.conf, or place it as a separate
# server block if Collabora is on its own subdomain.
#
# This block proxies the Collabora WebSocket endpoint used by the editor UI.
# Without it the editor will load but real-time collaboration won't work.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;   # replace with your domain in production

    # ── Static assets served by whitenoise via Django ─────────────────────
    location /static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }

    # ── Collabora WebSocket endpoint ───────────────────────────────────────
    # The editor iframe opens a WebSocket to /cool/... on the same origin.
    # We proxy it directly to the Collabora container.
    location ^~ /cool/ {
        proxy_pass         http://collabora:9980;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 36000s;
    }

    # ── Collabora browser assets ───────────────────────────────────────────
    location ^~ /browser/ {
        proxy_pass         http://collabora:9980;
        proxy_set_header   Host $host;
    }

    # ── Django app ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}