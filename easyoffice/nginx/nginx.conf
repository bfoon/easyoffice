upstream easyoffice {
    server web:8000;
}

# Required for WebSocket proxying (both Django Channels and Collabora)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    # ── Static & media ─────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # ── Collabora browser assets (JS/CSS for the editor UI) ────────────────
    location ^~ /browser/ {
        proxy_pass       http://collabora:9980;
        proxy_set_header Host $host;
    }

    # ── Collabora WebSocket — must come before / ────────────────────────────
    # The editor iframe opens a persistent WebSocket here while editing.
    location ^~ /cool/ {
        proxy_pass         http://collabora:9980;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 36000s;
    }

    # ── Django WebSockets (Channels — chat, presence, etc.) ────────────────
    location /ws/ {
        proxy_pass         http://easyoffice;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
    }

    # ── Django app (everything else) ───────────────────────────────────────
    location / {
        proxy_pass         http://easyoffice;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}