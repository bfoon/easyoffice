<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Navy rounded square background, matching #1e3a5f-ish tone in the upload -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="#1e3a5f"/>
  <!-- 3 x 3 grid of rounded white squares (bi-grid-3x3-gap-fill style) -->
  <g fill="#ffffff">
    <rect x="128" y="128" width="72" height="72" rx="14" ry="14"/>
    <rect x="220" y="128" width="72" height="72" rx="14" ry="14"/>
    <rect x="312" y="128" width="72" height="72" rx="14" ry="14"/>

    <rect x="128" y="220" width="72" height="72" rx="14" ry="14"/>
    <rect x="220" y="220" width="72" height="72" rx="14" ry="14"/>
    <rect x="312" y="220" width="72" height="72" rx="14" ry="14"/>

    <rect x="128" y="312" width="72" height="72" rx="14" ry="14"/>
    <rect x="220" y="312" width="72" height="72" rx="14" ry="14"/>
    <rect x="312" y="312" width="72" height="72" rx="14" ry="14"/>
  </g>
</svg>
