<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval Link Expired | EasyOffice</title>

    {% load static %}

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root{
            --eo-primary:#2563eb;
            --eo-primary-dark:#1d4ed8;
            --eo-accent:#0ea5e9;
            --eo-success:#10b981;
            --eo-warning:#f59e0b;
            --eo-danger:#ef4444;
            --eo-text:#111827;
            --eo-text-muted:#6b7280;
            --eo-border:#e5e7eb;
            --eo-bg:#f8fafc;
            --eo-card:#ffffff;
            --eo-shadow:0 18px 45px rgba(15, 23, 42, 0.10);
            --eo-radius:20px;
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            min-height:100vh;
            font-family:Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(239,68,68,.09), transparent 28%),
                radial-gradient(circle at bottom left, rgba(37,99,235,.08), transparent 30%),
                var(--eo-bg);
            color:var(--eo-text);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }

        .auth-shell{
            width:100%;
            max-width:500px;
        }

        .auth-brand{
            text-align:center;
            margin-bottom:18px;
        }

        .auth-brand-logo{
            width:64px;
            height:64px;
            margin:0 auto 12px;
            border-radius:18px;
            background:linear-gradient(135deg, var(--eo-primary), var(--eo-accent));
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.6rem;
            box-shadow:0 10px 24px rgba(37,99,235,.24);
        }

        .auth-brand h1{
            margin:0;
            font-size:1.5rem;
            font-weight:700;
        }

        .auth-brand p{
            margin:6px 0 0;
            color:var(--eo-text-muted);
            font-size:.95rem;
        }

        .auth-card{
            background:var(--eo-card);
            border:1px solid rgba(229,231,235,.95);
            border-radius:var(--eo-radius);
            box-shadow:var(--eo-shadow);
            padding:30px 28px;
            text-align:center;
        }

        .auth-status-icon{
            width:78px;
            height:78px;
            margin:0 auto 18px;
            border-radius:22px;
            background:#fef2f2;
            color:var(--eo-danger);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:2rem;
            border:1px solid #fecaca;
        }

        .auth-card h2{
            margin:0 0 10px;
            font-size:1.45rem;
            font-weight:700;
            color:var(--eo-text);
        }

        .auth-card p{
            margin:0 0 10px;
            color:var(--eo-text-muted);
            line-height:1.6;
        }

        .auth-actions{
            margin-top:24px;
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .auth-btn{
            width:100%;
            border:none;
            border-radius:14px;
            min-height:48px;
            font-size:.95rem;
            font-weight:600;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            cursor:pointer;
            text-decoration:none;
            transition:all .2s ease;
            padding:12px 18px;
        }

        .auth-btn-primary{
            background:linear-gradient(135deg, var(--eo-primary), var(--eo-accent));
            color:#fff;
            box-shadow:0 10px 24px rgba(37,99,235,.22);
        }

        .auth-btn-primary:hover{
            color:#fff;
            transform:translateY(-1px);
        }

        .auth-footer{
            margin-top:16px;
            font-size:.82rem;
            color:var(--eo-text-muted);
        }

        @media (max-width:576px){
            .auth-card{
                padding:24px 18px;
                border-radius:18px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-brand">
            <div class="auth-brand-logo">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1>EasyOffice</h1>
            <p>Secure device access</p>
        </div>

        <div class="auth-card">
            <div class="auth-status-icon">
                <i class="bi bi-link-45deg"></i>
            </div>

            <h2>Approval Link Expired</h2>
            <p>This device switch approval link is no longer valid.</p>
            <p>Please log in again to request a new approval email.</p>

            <div class="auth-actions">
                <a href="{% url 'login' %}" class="auth-btn auth-btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Return to Login
                </a>
            </div>

            <div class="auth-footer">
                For security reasons, approval links can only be used for a limited time.
            </div>
        </div>
    </div>
</body>
</html>
