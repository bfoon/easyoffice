{% extends "customer_portal/_base.html" %}
{# Technician portal pages reuse the customer portal shell + design tokens. #}
{# We just override the header brand to read "Technician Portal". #}

{% block extra_head %}
<style>
  /* Tech portal accent: a calmer blue so techs can tell it apart from the
     customer (red) portal at a glance, without leaving the design system. */
  .tp-header {
    background: var(--card); border-bottom: 1px solid var(--rule);
    position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
  }
  .tp-header-inner {
    max-width: 980px; margin: 0 auto; padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .tp-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
  .tp-brand-icon {
    width: 34px; height: 34px; background: #1a56db; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px;
  }
  .tp-brand-name { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: -.02em; }
  .tp-header-meta { font-size: 12px; color: var(--ink-muted); text-align: right; line-height: 1.4; }
  .tp-header-meta strong { display: block; color: var(--ink-soft); font-weight: 500; }

  /* Locked entry visual */
  .tp-locked { opacity: .72; }
  .tp-lock-badge {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    font-weight: 600; color: var(--ink-muted); background: var(--rule-light);
    padding: 3px 9px; border-radius: 999px;
  }
  .tp-entry {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 16px; border: 1px solid var(--rule); border-radius: var(--radius);
    margin-bottom: 10px; background: var(--card);
  }
  .tp-entry:hover { box-shadow: var(--shadow-sm); }
  .tp-entry-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .tp-table { width: 100%; border-collapse: collapse; }
  .tp-table th, .tp-table td {
    padding: 10px 12px; text-align: left; font-size: 13.5px;
    border-bottom: 1px solid var(--rule-light); vertical-align: top;
  }
  .tp-table thead th {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--ink-muted); font-weight: 600;
  }
  .tp-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width:560px){ .tp-form-grid { grid-template-columns: 1fr; } }
</style>
{% block tp_extra_head %}{% endblock %}
{% endblock %}
