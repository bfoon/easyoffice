{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif;
         background:#f8fafc; margin:0; padding:24px; color:#0f172a; }
  .wrap { max-width:560px; margin:0 auto; background:#fff; border-radius:14px;
          overflow:hidden; box-shadow:0 6px 20px rgba(15,23,42,.08); }
  .head { background:linear-gradient(135deg,#1e3a8a,#4c1d95); color:#fff;
          padding:18px 24px; }
  .head h1 { margin:0; font-size:1.1rem; font-weight:700; }
  .body { padding:20px 24px; line-height:1.55; font-size:.95rem; }
  .meta { background:#f8fafc; border-radius:10px; padding:12px 14px;
          margin:14px 0; font-size:.88rem; }
  .meta strong { color:#475569; display:inline-block; width:90px; }
  .btn { display:inline-block; background:#2563eb; color:#fff !important;
         padding:10px 18px; border-radius:8px; text-decoration:none;
         font-weight:600; margin-top:12px; }
  .foot { padding:14px 24px; font-size:.78rem; color:#64748b;
          background:#f8fafc; border-top:1px solid #e5e7eb; }
  .pill { display:inline-block; background:#fee2e2; color:#991b1b;
          padding:2px 10px; border-radius:999px; font-size:.75rem;
          font-weight:700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>{% block heading %}Customer Service Notification{% endblock %}</h1></div>
  <div class="body">{% block content %}{% endblock %}</div>
  <div class="foot">{% block footer %}This is an automated notification from the Customer Service module.{% endblock %}</div>
</div>
</body>
</html>
