<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live chat · {{ ticket.ticket_no }}</title>
  <style>
    body{margin:0;background:#eef2ff;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:#0f172a}.shell{max-width:760px;margin:0 auto;padding:24px}.card{background:#fff;border-radius:24px;box-shadow:0 24px 70px rgba(15,23,42,.16);overflow:hidden}.head{padding:22px 24px;background:linear-gradient(135deg,#0f172a,#2563eb);color:#fff}.head h1{font-size:22px;margin:0 0 6px}.head p{margin:0;color:#dbeafe;font-size:14px}.messages{height:58vh;min-height:360px;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:#f8fafc}.msg{max-width:82%;border:1px solid #e5e7eb;border-radius:18px;padding:10px 14px;background:#fff}.msg.customer{align-self:flex-end;background:#dbeafe;border-color:#93c5fd}.msg.agent{align-self:flex-start;background:#fff}.msg.system{align-self:center;background:#e2e8f0;border-style:dashed;color:#475569}.msg strong{display:block;font-size:12px;color:#475569;margin-bottom:3px}.msg div{white-space:pre-wrap;word-break:break-word;font-size:14px;line-height:1.45}.compose{display:flex;gap:10px;padding:14px;background:#fff;border-top:1px solid #e5e7eb}.compose textarea{flex:1;border:1px solid #cbd5e1;border-radius:16px;padding:12px 14px;min-height:52px;resize:vertical;font:inherit}.compose button{border:0;border-radius:16px;background:#2563eb;color:#fff;font-weight:800;padding:0 20px}.notice{padding:10px 20px;background:#ecfeff;color:#155e75;font-size:13px}.offline{background:#fff7ed;color:#9a3412}.small{font-size:12px;opacity:.85}
  </style>
</head>
<body>
<div class="shell">
  <div class="card">
    <div class="head">
      <h1>Live chat with Customer Service</h1>
      <p>Ticket {{ ticket.ticket_no }} · {{ ticket.subject }}</p>
      <p class="small">This secure link is tied to the first device that opens it.</p>
    </div>
    <div class="notice" id="stateText">Connecting…</div>
    <div class="messages" id="messages">
      {% for m in messages %}
        <div class="msg {{ m.author_kind }}"><strong>{{ m.author_display }}</strong><div>{{ m.body }}</div></div>
      {% empty %}
        <div class="msg system"><strong>System</strong><div>No messages yet. You can start the chat below.</div></div>
      {% endfor %}
    </div>
    <form class="compose" id="chatForm">
      <textarea id="chatInput" placeholder="Type your message…" required></textarea>
      <button type="submit">Send</button>
    </form>
  </div>
</div>

<script>
(function(){
  const wsPath = '{{ ws_path|escapejs }}';
  const finalizeUrl = '{{ finalize_url|escapejs }}';
  const messages = document.getElementById('messages');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('chatInput');
  const stateText = document.getElementById('stateText');

  const fingerprint = [
    navigator.userAgent || '', navigator.language || '', screen.width + 'x' + screen.height,
    new Date().getTimezoneOffset(), navigator.platform || ''
  ].join('|');

  fetch(finalizeUrl, {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: new URLSearchParams({fingerprint})
  }).catch(function(){});

  const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const socket = new WebSocket(`${scheme}://${window.location.host}${wsPath}`);

  function addMessage(m){
    const empty = messages.querySelector('.msg.system div');
    if (empty && empty.textContent.includes('No messages yet')) empty.parentElement.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${m.author_kind || 'system'}`;
    const name = document.createElement('strong'); name.textContent = m.author_display || 'System';
    const body = document.createElement('div'); body.textContent = m.body || '';
    wrap.appendChild(name); wrap.appendChild(body); messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  socket.onopen = function(){ stateText.textContent = 'Connected. You are chatting with our support team.'; };
  socket.onclose = function(){ stateText.textContent = 'Chat disconnected or no longer active.'; stateText.classList.add('offline'); input.disabled = true; form.querySelector('button').disabled = true; };
  socket.onmessage = function(e){
    const data = JSON.parse(e.data || '{}');
    if (data.type === 'history') {
      messages.innerHTML = '';
      (data.messages || []).forEach(addMessage);
      if (!(data.messages || []).length) addMessage({author_kind:'system', author_display:'System', body:'No messages yet. You can start the chat below.'});
    }
    if (data.type === 'message') addMessage(data.message || {});
    if (data.type === 'state') {
      const s = data.state || {};
      if (s.is_active && !s.is_locked) {
        stateText.textContent = 'Connected. You are chatting with our support team.';
      } else {
        stateText.textContent = s.is_locked ? 'This live chat is locked.' : 'This live chat has been closed.';
        stateText.classList.add('offline'); input.disabled = true; form.querySelector('button').disabled = true;
      }
    }
    if (data.type === 'error') addMessage({author_kind:'system', author_display:'System', body:data.message || 'Message failed.'});
  };

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const body = input.value.trim();
    if (!body || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({type:'message', body}));
    input.value = '';
  });
})();
</script>
</body>
</html>
