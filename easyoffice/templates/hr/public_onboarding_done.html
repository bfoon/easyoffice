<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Onboarding Submitted</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f7faff, #eef6ff);
      font-family: "Segoe UI", Arial, sans-serif;
      color: #172033;
      padding: 20px;
    }
    .card {
      max-width: 680px;
      background: #fff;
      border: 1px solid #e6edf6;
      border-radius: 28px;
      padding: 38px;
      box-shadow: 0 18px 48px rgba(15,61,115,.14);
      text-align: center;
    }
    .icon {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      background: #ecfdf5;
      color: #059669;
      font-size: 38px;
      font-weight: 900;
    }
    h1 { margin: 0 0 10px; }
    p { color: #667085; line-height: 1.7; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>Onboarding Submitted</h1>
    <p>
      Thank you, {{ onboarding.full_name }}. Your onboarding form has been submitted successfully.
      HR will review your information and continue the process.
    </p>
    <p>You may now close this page.</p>
  </main>
</body>
</html>
