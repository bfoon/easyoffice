{% load humanize %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Label — {{ label_text }}</title>
  <style>
    @page { size: A6 landscape; margin: 4mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #f3f4f6;
    }
    .actions {
      padding: 16px;
      display: flex; gap: 8px; justify-content: center;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .actions button, .actions a {
      padding: 8px 18px; border: 1px solid #e5e7eb; border-radius: 8px;
      background: #fff; color: #0f172a;
      cursor: pointer; font-size: .86rem; font-weight: 600;
      text-decoration: none; transition: all .15s ease;
    }
    .actions a:hover, .actions button:hover { background: #f8fafc; }
    .actions button.primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff; border-color: #1d4ed8;
    }
    .wrap { padding: 30px 16px; display: flex; justify-content: center; }
    .label {
      width: 105mm; min-height: 74mm;
      background: #fff; border: 2px solid #0f172a;
      border-radius: 8px; padding: 6mm;
      display: grid; grid-template-columns: 38mm 1fr; gap: 5mm;
      align-items: center;
      box-shadow: 0 12px 32px rgba(15, 23, 42, .12);
    }
    .qr { width: 38mm; height: 38mm; display: flex; align-items: center; justify-content: center; background: #fff; }
    .qr canvas, .qr img { width: 38mm !important; height: 38mm !important; }
    .meta { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
    .kind {
      text-transform: uppercase; font-size: 8pt; letter-spacing: 1.6px;
      color: #6b7280; font-weight: 800;
    }
    .name {
      font-size: 15pt; font-weight: 800; line-height: 1.15;
      margin-top: 3px; color: #0f172a; letter-spacing: -.01em;
    }
    .code {
      margin-top: 8px;
      font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: 10pt; color: #0f172a; word-break: break-all;
      padding: 3px 8px;
      background: #f1f5f9;
      border-radius: 4px;
      display: inline-block;
    }
    .hint { margin-top: 8px; font-size: 7pt; color: #6b7280; font-style: italic; }
    .token {
      margin-top: 6px; font-family: monospace; font-size: 6pt;
      color: #cbd5e1; word-break: break-all;
    }
    @media print {
      .actions { display: none !important; }
      body { background: #fff; }
      .wrap { padding: 0; }
      .label { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="actions">
    <button class="primary" onclick="window.print()">🖨 Print label</button>
    <a href="javascript:history.back()">← Back</a>
  </div>

  <div class="wrap">
    <div class="label">
      <div class="qr" id="qrBox"></div>
      <div class="meta">
        <div class="kind">{{ kind }}</div>
        <div class="name">{% firstof target.name target.code target.tag label_text %}</div>
        <div><span class="code">{{ label_text }}</span></div>
        <div class="hint">Scan with the inventory scanner</div>
        <div class="token">{{ token }}</div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrBox'), {
      text: "{{ scan_url|default:token|escapejs }}",
      width: 144, height: 144,
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
