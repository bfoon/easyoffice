{% load humanize %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Label — {{ label_text }}</title>
  <style>
    @page { size: A6 landscape; margin: 4mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #f3f4f6;
    }
    .wrap { padding: 20px; display: flex; justify-content: center; }
    .label {
      width: 105mm; height: 74mm;
      background: #fff; border: 2px solid #111;
      border-radius: 6px; padding: 4mm;
      display: grid; grid-template-columns: 38mm 1fr; gap: 4mm;
      align-items: center;
    }
    .qr { width: 38mm; height: 38mm; display: flex; align-items: center; justify-content: center; background: #fff; }
    .qr canvas, .qr img { width: 38mm !important; height: 38mm !important; }
    .meta { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
    .kind { text-transform: uppercase; font-size: 8pt; letter-spacing: 1.4px; color: #6b7280; font-weight: 700; }
    .name { font-size: 14pt; font-weight: 800; line-height: 1.15; margin-top: 2px; }
    .code { margin-top: 6px; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 10pt; color: #111; word-break: break-all; }
    .token { margin-top: 8px; font-family: monospace; font-size: 7pt; color: #9ca3af; word-break: break-all; }
    .hint { margin-top: 6px; font-size: 7pt; color: #6b7280; font-style: italic; }
    .actions { padding: 12px; display: flex; gap: 8px; justify-content: center; }
    .actions button, .actions a {
      padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; color: #111; cursor: pointer; font-size: 12pt; text-decoration: none;
    }
    .actions button.primary { background: #111; color: #fff; border-color: #111; }
    @media print { .actions, .hint-screen { display: none !important; } body { background: #fff; } .wrap { padding: 0; } }
  </style>
</head>
<body>

  <div class="actions hint-screen">
    <button class="primary" onclick="window.print()">🖨 Print</button>
    <a href="javascript:history.back()">← Back</a>
  </div>

  <div class="wrap">
    <div class="label">
      <div class="qr" id="qrBox"></div>
      <div class="meta">
        <div class="kind">{{ kind }}</div>
        <div class="name">{{ target.name|default:target.code|default:target.tag }}</div>
        <div class="code">{{ label_text }}</div>
        <div class="hint">Scan with the inventory scanner</div>
        <div class="token">{{ token }}</div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrBox'), {
      text: "{{ scan_url|default:token|escapejs }}",
      width: 144, height: 144,
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
