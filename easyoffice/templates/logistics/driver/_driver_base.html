{% extends "customer_portal/_base.html" %}
{# Driver portal reuses the portal shell + design tokens, green accent. #}

{% block extra_head %}
<style>
  :root { --drv: #1a6b3c; --drv-dk: #14512e; --drv-bg: #edf7f1; }
  .drv-header {
    background: var(--drv); color:#fff; position:sticky; top:0; z-index:100;
    box-shadow: var(--shadow-sm);
  }
  .drv-header-inner {
    max-width: 720px; margin:0 auto; padding: 0 18px; height: 60px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .drv-brand { display:flex; align-items:center; gap:9px; color:#fff; text-decoration:none; }
  .drv-brand-icon {
    width:32px; height:32px; background:rgba(255,255,255,.18); border-radius:8px;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .drv-brand-name { font-family:'DM Serif Display',serif; font-size:17px; }
  .drv-wrap { max-width: 720px; margin:0 auto; padding: 18px 16px 60px; }

  .drv-btn-primary { background: var(--drv); color:#fff; border-color: var(--drv); }
  .drv-btn-primary:hover { background: var(--drv-dk); border-color: var(--drv-dk); color:#fff; }

  /* delivery card */
  .drv-card {
    background:var(--card); border:1px solid var(--rule); border-radius:var(--radius-lg);
    padding:18px 18px; margin-bottom:14px; box-shadow:var(--shadow-sm);
  }
  .drv-ship {
    display:block; text-decoration:none; color:inherit;
    border:1px solid var(--rule); border-radius:var(--radius); padding:14px 16px;
    margin-bottom:10px; background:var(--card); transition:box-shadow .12s;
  }
  .drv-ship:hover { box-shadow:var(--shadow); }
  .drv-ref { font-family:'DM Sans',monospace; font-weight:600; font-size:13px; color:var(--drv); }
  .big-action {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:16px; border-radius:var(--radius); font-size:16px; font-weight:600;
    border:none; cursor:pointer; text-decoration:none; margin-bottom:10px;
  }
  .ba-go     { background: var(--drv); color:#fff; }
  .ba-map    { background:#1a56db; color:#fff; }
  .ba-sign   { background:#92651a; color:#fff; }
  .ba-ghost  { background:#fff; color:var(--ink); border:1.5px solid var(--rule); }
</style>
{% block drv_extra_head %}{% endblock %}
{% endblock %}
