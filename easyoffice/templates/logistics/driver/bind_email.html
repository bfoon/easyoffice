{% extends "logistics/driver/_driver_base.html" %}
{% block title %}Welcome — Driver Portal{% endblock %}
{% block content %}
<div class="drv-wrap" style="max-width:440px;margin-top:32px">
  <div class="drv-card" style="padding:36px 30px;text-align:center">
    <div style="width:56px;height:56px;background:var(--drv-bg);border-radius:50%;display:flex;
                align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:var(--drv)">
      <i class="bi bi-truck"></i>
    </div>
    <h1 style="font-family:'DM Serif Display',serif;font-size:23px;margin:0 0 8px">Confirm your email</h1>
    <p style="color:var(--ink-muted);font-size:14px;line-height:1.6;margin:0 0 22px">
      This is your personal delivery link. Enter your email once to set it up — we'll send a code to confirm it's you.
    </p>
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:16px;text-align:left">
        <label class="p-label">Your email</label>
        <input type="email" name="email" class="p-input" required placeholder="you@example.com" autofocus>
      </div>
      <button class="p-btn drv-btn-primary" style="width:100%;justify-content:center"><i class="bi bi-arrow-right"></i> Continue</button>
    </form>
  </div>
</div>
{% endblock %}
