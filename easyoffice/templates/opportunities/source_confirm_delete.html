{% extends 'base.html' %}
{% block title %}Delete Source{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="card border-0 shadow-sm rounded-4 mx-auto" style="max-width:700px;">
        <div class="card-body p-4">
            <h3 class="mb-3">Delete Source</h3>
            <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'opportunity_source_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
