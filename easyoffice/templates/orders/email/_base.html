{% load humanize %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block subject %}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f5f6fa;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1f2937">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f6fa;padding:32px 12px">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <tr><td style="padding:24px 28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#ffffff">
          <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;opacity:.85;font-weight:600">{% block kicker %}{% endblock %}</div>
          <div style="font-size:1.4rem;font-weight:700;margin-top:4px">{% block heading %}{% endblock %}</div>
        </td></tr>
        <tr><td style="padding:28px;font-size:.95rem;line-height:1.6;color:#374151">
          {% block content %}{% endblock %}
        </td></tr>
        <tr><td style="padding:18px 28px;background:#f9fafb;border-top:1px solid #e5e7eb;font-size:.78rem;color:#6b7280;text-align:center">
          {% block footer %}This is an automated message — please do not reply directly.{% endblock %}
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
