{% extends "poi/base_external.html" %}
{% block title %}Link expired{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto;text-align:center;padding:28px;
  border:1px solid var(--eo-border);border-radius:14px;background:var(--eo-surface)">
  <h2 style="color:var(--eo-text)">This link has expired</h2>
  <p style="color:var(--eo-text-muted);font-size:.88rem">
    Your registration link is no longer valid. Please contact your administrator for a new invitation.
  </p>
</div>
{% endblock %}
