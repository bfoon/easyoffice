<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Thank you — {{ survey.title }}</title>
<style>
:root {
  --proj:        {{ survey.project.cover_color|default:"#1e3a5f" }};
  --proj-dark:   color-mix(in srgb, var(--proj) 82%, #000000);
  --proj-darker: color-mix(in srgb, var(--proj) 65%, #000000);
  --proj-light:  color-mix(in srgb, var(--proj) 14%, #ffffff);
  --proj-soft:   color-mix(in srgb, var(--proj) 7%,  #ffffff);
  --proj-tint:   color-mix(in srgb, var(--proj) 22%, #ffffff);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(circle at 20% 10%, var(--proj-light), transparent 50%),
    radial-gradient(circle at 80% 90%, var(--proj-soft), transparent 50%),
    #f1f5f9;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px; color:#0f172a;
}
.card {
  background:#fff; border-radius:20px;
  box-shadow:0 20px 60px rgba(15,23,42,.12), 0 0 0 1px rgba(255,255,255,.8);
  max-width:480px; width:100%; overflow:hidden;
  animation: riseIn .5s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes riseIn {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}
.banner {
  height:6px;
  background:linear-gradient(90deg, var(--proj-dark), var(--proj), var(--proj-tint));
}
.body { padding:44px 40px; text-align:center; }
.check {
  width:84px; height:84px; margin:0 auto 22px;
  border-radius:50%;
  background:linear-gradient(135deg, #10b981, #059669);
  color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:2.4rem; font-weight:800;
  box-shadow:0 12px 28px rgba(16,185,129,.35);
  animation: popIn .5s cubic-bezier(.2,.8,.2,1) .15s both;
}
@keyframes popIn {
  0% { transform: scale(.4); opacity:0; }
  60%{ transform: scale(1.1); }
  100%{ transform: scale(1); opacity:1; }
}
h1 {
  font-size:1.5rem; font-weight:800; color:#0f172a; margin-bottom:10px;
  letter-spacing:-.01em;
}
.lead { color:#334155; font-size:.95rem; line-height:1.6; margin-bottom:6px; }
.lead strong { color:var(--proj-dark); }
.sub { color:#64748b; font-size:.88rem; line-height:1.6; }
.divider {
  margin:24px auto; width:40px; height:3px; border-radius:2px;
  background:var(--proj-tint);
}
.project-tag {
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:999px;
  background:var(--proj-light); color:var(--proj-dark);
  font-size:.78rem; font-weight:700;
}
.project-tag::before {
  content:''; width:8px; height:8px; border-radius:50%;
  background:var(--proj);
}
.footer {
  text-align:center; font-size:.72rem; color:#94a3b8;
  margin-top:18px;
}
</style>
</head>
<body>
<div class="card">
  <div class="banner"></div>
  <div class="body">
    <div class="check">✓</div>
    <h1>Thank you!</h1>
    <p class="lead">
      Your response to <strong>{{ survey.title }}</strong> has been recorded successfully.
    </p>
    <p class="sub">Your feedback is appreciated.</p>
    <div class="divider"></div>
    <div class="project-tag">{{ survey.project.name }}</div>
    <div class="footer">You can safely close this tab.</div>
  </div>
</div>
</body>
</html>
