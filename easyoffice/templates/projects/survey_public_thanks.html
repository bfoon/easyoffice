<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Thank you — {{ survey.title }}</title>
<style>
  body{font-family:system-ui,sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.1);max-width:480px;width:100%;padding:48px 40px;text-align:center}
  .check{width:72px;height:72px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 20px}
  h1{font-size:1.4rem;font-weight:700;color:#0f172a;margin-bottom:10px}
  p{color:#64748b;font-size:.92rem;line-height:1.6}
  .project{margin-top:24px;font-size:.78rem;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1>Thank you!</h1>
  <p>Your response to <strong>{{ survey.title }}</strong> has been recorded successfully.</p>
  <p style="margin-top:10px">Your feedback is appreciated.</p>
  <div class="project">{{ survey.project.name }}</div>
</div>
</body>
</html>
