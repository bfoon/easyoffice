<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Reset link invalid</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root{
      --ua-ink:#0b0f14; --ua-ink-2:#1c2530; --ua-ink-3:#475569; --ua-ink-4:#94a3b8;
      --ua-paper:#fafaf7; --ua-paper-2:#f3f2ec; --ua-surface:#fff;
      --ua-line:#e5e4dd; --ua-line-2:#cfcec4;
      --ua-accent:#1e40af; --ua-gold:#a97b2f;
      --ua-red:#b91c1c;
      --ua-display:'Instrument Serif', ui-serif, Georgia, serif;
      --ua-sans:'Inter Tight', -apple-system, sans-serif;
      --ua-mono:'JetBrains Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: var(--ua-sans);
      font-feature-settings:"ss01","cv11","tnum";
      color: var(--ua-ink);
      background: var(--ua-paper);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before{
      content:""; position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 700px 400px at 90% 10%, rgba(185,28,28,.07), transparent 60%),
        radial-gradient(ellipse 700px 400px at 10% 90%, rgba(11,15,20,.05), transparent 60%);
      pointer-events: none;
    }

    .brand-strip{
      position: relative; z-index: 2;
      width: 100%; max-width: 520px;
      display: flex; justify-content: center;
      margin-bottom: 22px;
    }
    .brand-mark{
      font-family: var(--ua-display);
      font-size: 1.4rem;
      color: var(--ua-ink);
      letter-spacing: -.01em;
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .brand-mark::before{
      content:""; width: 22px; height: 22px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--ua-ink), var(--ua-accent));
    }
    .brand-mark em{ font-style: italic; color: var(--ua-gold); }

    .pi-wrap{
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
    }

    .pi-card{
      background: var(--ua-surface);
      border: 1px solid var(--ua-line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 60px -25px rgba(11,15,20,.22);
      padding: 48px 32px 40px;
      text-align: center;
    }

    .pi-icon{
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #fee2e2; color: var(--ua-red);
      display:flex; align-items:center; justify-content:center;
      font-size: 1.9rem; margin: 0 auto 22px;
    }
    .pi-eyebrow{
      font-family: var(--ua-mono);
      font-size: .68rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--ua-red);
      margin-bottom: 10px;
    }
    .pi-title{
      font-family: var(--ua-display);
      font-size: 2rem; font-weight: 400; line-height: 1.05;
      margin: 0 0 14px 0; letter-spacing: -.01em;
    }
    .pi-title em{ font-style: italic; color: var(--ua-gold); }
    .pi-desc{
      color: var(--ua-ink-3); font-size: .94rem;
      line-height: 1.6; max-width: 380px; margin: 0 auto 26px;
    }

    .pi-cta{
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 22px; border-radius: 10px;
      background: var(--ua-ink); color: #fff;
      border: 1px solid var(--ua-ink);
      font-size: .92rem; font-weight: 500;
      text-decoration: none; transition: all .15s;
    }
    .pi-cta:hover{ background: var(--ua-accent); border-color: var(--ua-accent); transform: translateY(-1px); }

    .pi-back{
      display: block; text-align: center; margin-top: 16px;
      color: var(--ua-ink-3); font-size: .85rem;
      text-decoration: none; transition: color .15s;
    }
    .pi-back:hover{ color: var(--ua-ink); }

    .page-foot{
      position: relative; z-index: 2;
      margin-top: 28px;
      font-family: var(--ua-mono);
      font-size: .68rem; letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ua-ink-4);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="brand-strip">
    <a href="/" class="brand-mark">Easy<em>Office</em></a>
  </div>

  <div class="pi-wrap">
    <div class="pi-card">
      <div class="pi-icon"><i class="bi bi-x-octagon-fill"></i></div>
      <div class="pi-eyebrow">Link no longer valid</div>
      <h1 class="pi-title">This link <em>can't be used</em></h1>
      <p class="pi-desc">
        The password reset link you opened has expired, has already been used, or doesn't match an active account. Request a fresh one to continue.
      </p>

      <a href="{% url 'user_admin:password_reset_request' %}" class="pi-cta">
        <i class="bi bi-envelope"></i> Send a new reset link
      </a>

      <a href="{% url 'login' %}" class="pi-back">
        <i class="bi bi-arrow-left"></i> Back to sign in
      </a>
    </div>
  </div>

  <div class="page-foot">Secure · encrypted</div>

</body>
</html>
